name: Validate SAN WMS Build

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Runtime versions
        run: node --version && npm --version
      - name: Install dependencies
        run: npm install
      - name: Build
        run: npm run build

name: Validate SAN WMS V4

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - name: Parse PostgreSQL migrations
        run: |
          python -m pip install --quiet pglast
          python - <<'PY'
          from pathlib import Path
          from pglast import parse_sql
          for name in [
              "supabase/20_IDENTITY_PIN_TERMS_CONSENT.sql",
              "supabase/21_WORK_REQUESTS_KPI_CALENDAR.sql",
              "supabase/22_PHASED_V4_ACTIVATION.sql",
          ]:
              parse_sql(Path(name).read_text(encoding="utf-8"))
              print(f"Parsed: {name}")
          PY
      - run: npm run typecheck
      - run: npm run build

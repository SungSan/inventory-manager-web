name: Validate SAN WMS V4

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - name: Parse PostgreSQL migrations
        run: |
          python -m pip install --quiet pglast
          python - <<'PY'
          from pathlib import Path
          from pglast import parse_sql
          for name in [
              "supabase/20_IDENTITY_PIN_TERMS_CONSENT.sql",
              "supabase/21_WORK_REQUESTS_KPI_CALENDAR.sql",
          ]:
              sql = Path(name).read_text(encoding="utf-8")
              parse_sql(sql)
              print(f"Parsed: {name}")
          PY
      - name: Typecheck
        id: typecheck
        shell: bash
        run: |
          set +e
          npm run typecheck > typecheck.log 2>&1
          code=$?
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: v4-typecheck-diagnostics
          path: typecheck.log
      - name: Fail on typecheck errors
        if: steps.typecheck.outputs.exit_code != '0'
        run: exit 1
      - run: npm run build

name: Validate V4.1.0

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Validate PostgreSQL migration syntax
        run: |
          python -m pip install --quiet pglast
          python - <<'PY'
          from pathlib import Path
          from pglast import parse_sql
          path = Path('supabase/24_USER_ACCOUNT_STATUS_MANAGEMENT.sql')
          parse_sql(path.read_text(encoding='utf-8'))
          print(f'Parsed {path}')
          PY
      - name: Install dependencies
        run: npm install --no-audit --no-fund
      - name: Typecheck
        run: npm run typecheck
      - name: Production build
        run: npm run build

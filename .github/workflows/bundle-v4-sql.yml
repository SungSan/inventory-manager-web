name: Bundle SAN WMS V4 SQL

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  bundle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/upload-artifact@v4
        with:
          name: san-wms-v4-sql
          path: |
            supabase/20_IDENTITY_PIN_TERMS_CONSENT.sql
            supabase/21_WORK_REQUESTS_KPI_CALENDAR.sql
            supabase/22_PHASED_V4_ACTIVATION.sql

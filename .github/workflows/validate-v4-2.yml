name: Validate V4.2.0

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Validate PostgreSQL migration syntax
        run: |
          python -m pip install --quiet pglast
          python - <<'PY'
          from pathlib import Path
          from pglast import parse_sql
          parse_sql(Path('supabase/25_WORK_REQUEST_SAME_DAY_CUTOFF_AND_UNRESTRICTED_START.sql').read_text())
          print('SQL syntax OK')
          PY
      - name: Install dependencies
        run: npm install --no-audit --no-fund
      - name: Typecheck
        run: npm run typecheck
      - name: Production build
        run: npm run build
